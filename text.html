<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EasyColoc - User Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1337ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="flex h-screen overflow-hidden">
<!-- Sidebar -->
<aside class="w-64 flex-shrink-0 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col justify-between p-6">
<div class="space-y-8">
<!-- Logo -->
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/10 rounded-lg text-primary">
<span class="material-symbols-outlined">home</span>
</div>
<div>
<h1 class="text-lg font-bold leading-none">EasyColoc</h1>
<p class="text-xs text-slate-500">Flatshare Management</p>
</div>
</div>
<!-- Nav -->
<nav class="space-y-1">
<a class="flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-sm font-medium">Dashboard</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">group</span>
<span class="text-sm font-medium">Colocations</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 bg-primary text-white rounded-xl shadow-lg shadow-primary/20" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">person</span>
<span class="text-sm font-medium">Profile</span>
</a>
</nav>
</div>
<!-- Reputation Card -->
<div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl space-y-3">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">stars</span>
<span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Réputation</span>
</div>
<span class="text-xs font-bold text-primary">+0 pts</span>
</div>
<div class="h-2 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 5%"></div>
</div>
<p class="text-[10px] text-slate-400 text-center italic">Améliorez votre profil pour gagner des points</p>
</div>
</aside>
<!-- Main Content -->
<div class="flex-1 flex flex-col overflow-hidden">
<!-- Top Bar -->
<header class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-between px-8">
<h2 class="text-sm font-bold tracking-[0.1em] text-slate-500 uppercase">Mon Profil</h2>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 px-3 py-1 bg-emerald-50 dark:bg-emerald-950/30 rounded-full">
<div class="size-2 bg-emerald-500 rounded-full"></div>
<span class="text-[11px] font-bold text-emerald-600 uppercase">En ligne</span>
</div>
<div class="flex items-center gap-3 pl-4 border-l border-slate-200 dark:border-slate-800">
<span class="text-sm font-semibold">USER 2</span>
<div class="size-10 rounded-full bg-primary flex items-center justify-center text-white font-bold text-lg" data-alt="User avatar with initial U">U</div>
</div>
</div>
</header>
<!-- Scrollable Content -->

</div>
</div>
</body></html>
